<svg width="680" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:sans-serif">

<!-- Title -->
<text x="340" y="30" text-anchor="middle" font-size="16" font-weight="500" fill="#2C2C2A">Dot Product — 드리프트 판정 원리</text>
<text x="340" y="50" text-anchor="middle" font-size="12" fill="#5F5E5A">Forward 벡터와 Velocity 벡터의 내적으로 미끄러짐 감지</text>

<!-- === Case 1: 직진 === -->
<text x="170" y="90" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">직진 상태</text>
<text x="170" y="108" text-anchor="middle" font-size="12" fill="#5F5E5A">CosAngle ≈ 1.0</text>

<!-- Car body -->
<rect x="140" y="170" width="60" height="100" rx="10" fill="none" stroke="#5F5E5A" stroke-width="1.5"/>
<rect x="146" y="178" width="48" height="20" rx="4" fill="#D3D1C7" opacity="0.4"/>
<rect x="134" y="180" width="8" height="20" rx="2" fill="#888780"/>
<rect x="198" y="180" width="8" height="20" rx="2" fill="#888780"/>
<rect x="134" y="240" width="8" height="20" rx="2" fill="#888780"/>
<rect x="198" y="240" width="8" height="20" rx="2" fill="#888780"/>

<!-- Forward vector -->
<line x1="170" y1="165" x2="170" y2="105" stroke="#378ADD" stroke-width="2.5"/>
<polygon points="170,95 164,107 176,107" fill="#378ADD"/>
<text x="130" y="128" font-size="12" fill="#378ADD" font-weight="500">Forward</text>

<!-- Velocity vector -->
<line x1="185" y1="165" x2="185" y2="105" stroke="#639922" stroke-width="2.5"/>
<polygon points="185,95 179,107 191,107" fill="#639922"/>
<text x="200" y="128" font-size="12" fill="#639922" font-weight="500">Velocity</text>

<text x="170" y="300" text-anchor="middle" font-size="12" fill="#5F5E5A">두 벡터가 같은 방향</text>
<text x="170" y="316" text-anchor="middle" font-size="12" fill="#5F5E5A">→ 내적값 = 1.0 (직진)</text>

<!-- Result badge -->
<rect x="110" y="330" width="120" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="170" y="350" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">드리프트 OFF</text>

<!-- === Case 2: 드리프트 === -->
<text x="500" y="90" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">드리프트 상태</text>
<text x="500" y="108" text-anchor="middle" font-size="12" fill="#5F5E5A">CosAngle &lt; 0.94</text>

<!-- Car body (angled) -->
<g transform="translate(500, 220) rotate(-25)">
  <rect x="-25" y="-40" width="50" height="80" rx="8" fill="none" stroke="#5F5E5A" stroke-width="1.5"/>
  <rect x="-20" y="-34" width="40" height="16" rx="3" fill="#D3D1C7" opacity="0.4"/>
  <rect x="-30" y="-32" width="7" height="16" rx="2" fill="#888780"/>
  <rect x="23" y="-32" width="7" height="16" rx="2" fill="#888780"/>
  <rect x="-30" y="16" width="7" height="16" rx="2" fill="#888780"/>
  <rect x="23" y="16" width="7" height="16" rx="2" fill="#888780"/>
</g>

<!-- Forward vector (angled) -->
<line x1="500" y1="168" x2="478" y2="108" stroke="#378ADD" stroke-width="2.5"/>
<polygon points="474,100 470,114 484,110" fill="#378ADD"/>
<text x="438" y="118" font-size="12" fill="#378ADD" font-weight="500">Forward</text>

<!-- Velocity vector (straight up) -->
<line x1="500" y1="168" x2="500" y2="108" stroke="#639922" stroke-width="2.5"/>
<polygon points="500,98 494,110 506,110" fill="#639922"/>
<text x="514" y="118" font-size="12" fill="#639922" font-weight="500">Velocity</text>

<!-- Angle arc -->
<path d="M492 138 A 25 25 0 0 1 484 134" fill="none" stroke="#D85A30" stroke-width="1.5"/>
<text x="468" y="148" font-size="13" fill="#D85A30" font-weight="500">θ</text>

<!-- Smoke -->
<circle cx="520" cy="260" r="4" fill="#888780" opacity="0.2"/>
<circle cx="528" cy="268" r="6" fill="#888780" opacity="0.15"/>
<circle cx="538" cy="275" r="8" fill="#888780" opacity="0.1"/>

<text x="500" y="310" text-anchor="middle" font-size="12" fill="#5F5E5A">두 벡터 사이에 각도 발생</text>
<text x="500" y="326" text-anchor="middle" font-size="12" fill="#5F5E5A">→ 내적값 &lt; 0.94 (미끄러짐)</text>

<!-- Result badge -->
<rect x="440" y="340" width="120" height="32" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="500" y="360" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13" dominant-baseline="central">드리프트 ON</text>

<!-- Formula -->
<line x1="60" y1="395" x2="620" y2="395" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="340" y="425" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">코드에서의 활용</text>
<text x="340" y="450" text-anchor="middle" font-size="12" fill="#5F5E5A" font-family="monospace">CosAngle = DotProduct(Velocity.Normalize(), Forward)</text>
<text x="340" y="472" text-anchor="middle" font-size="12" fill="#5F5E5A">CosAngle이 1.0에서 멀어질수록 → 차가 더 많이 미끄러지고 있다는 의미</text>
</svg>