<svg width="680" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:sans-serif">

<!-- Title -->
<text x="340" y="28" text-anchor="middle" font-size="16" font-weight="500" fill="#2C2C2A">GetSafeNormal — 벡터 정규화(Normalize)</text>
<text x="340" y="48" text-anchor="middle" font-size="12" fill="#5F5E5A">벡터의 크기를 1로 만들어 "방향만" 추출하는 연산</text>

<!-- === 좌측: 정규화 전 === -->
<text x="170" y="82" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">정규화 전</text>
<text x="170" y="100" text-anchor="middle" font-size="12" fill="#5F5E5A">크기가 다 다른 벡터들</text>

<!-- Origin -->
<circle cx="120" cy="240" r="3" fill="#5F5E5A"/>

<!-- Vector A: long -->
<line x1="120" y1="240" x2="265" y2="158" stroke="#378ADD" stroke-width="2.5"/>
<polygon points="270,155 258,150 260,164" fill="#378ADD"/>
<text x="275" y="152" font-size="12" fill="#378ADD" font-weight="500">속도 3000</text>

<!-- Vector B: medium -->
<line x1="120" y1="240" x2="205" y2="188" stroke="#639922" stroke-width="2.5"/>
<polygon points="210,185 198,182 200,194" fill="#639922"/>
<text x="215" y="182" font-size="12" fill="#639922" font-weight="500">속도 1500</text>

<!-- Vector C: short -->
<line x1="120" y1="240" x2="152" y2="218" stroke="#D85A30" stroke-width="2.5"/>
<polygon points="155,215 144,214 148,224" fill="#D85A30"/>
<text x="160" y="212" font-size="12" fill="#D85A30" font-weight="500">속도 500</text>

<text x="170" y="282" text-anchor="middle" font-size="12" fill="#5F5E5A">같은 방향이지만</text>
<text x="170" y="298" text-anchor="middle" font-size="12" fill="#5F5E5A">속도(크기)에 따라 벡터 길이가 다름</text>

<rect x="90" y="315" width="160" height="32" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="170" y="335" text-anchor="middle" font-size="14" font-weight="500" fill="#791F1F" dominant-baseline="central">비교가 어려움</text>

<!-- === 중앙: 화살표 === -->
<line x1="310" y1="210" x2="365" y2="210" stroke="#5F5E5A" stroke-width="1.5"/>
<polygon points="370,210 360,206 360,214" fill="#5F5E5A"/>
<text x="340" y="200" text-anchor="middle" font-size="12" fill="#5F5E5A" font-family="monospace">.GetSafeNormal()</text>

<!-- === 우측: 정규화 후 === -->
<text x="510" y="82" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">정규화 후</text>
<text x="510" y="100" text-anchor="middle" font-size="12" fill="#5F5E5A">크기가 모두 1인 벡터들</text>

<!-- Unit circle -->
<circle cx="460" cy="240" r="70" fill="none" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
<text x="540" y="244" font-size="12" fill="#888780">크기 = 1</text>

<!-- Origin -->
<circle cx="460" cy="240" r="3" fill="#5F5E5A"/>

<!-- All three normalized (same length) -->
<line x1="460" y1="240" x2="507" y2="194" stroke="#378ADD" stroke-width="2.5"/>
<polygon points="510,191 500,190 504,200" fill="#378ADD"/>

<line x1="460" y1="240" x2="507" y2="198" stroke="#639922" stroke-width="2" stroke-dasharray="4 3"/>
<polygon points="510,195 500,195 504,204" fill="#639922"/>

<line x1="460" y1="240" x2="505" y2="202" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="2 3"/>
<polygon points="508,199 498,200 502,208" fill="#D85A30"/>

<text x="518" y="178" font-size="12" fill="#378ADD" font-weight="500">방향만 남음</text>
<text x="518" y="218" font-size="12" fill="#5F5E5A">(크기 무관하게 동일)</text>

<text x="510" y="282" text-anchor="middle" font-size="12" fill="#5F5E5A">속도가 달라도</text>
<text x="510" y="298" text-anchor="middle" font-size="12" fill="#5F5E5A">방향만 비교할 수 있음</text>

<rect x="430" y="315" width="160" height="32" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="510" y="335" text-anchor="middle" font-size="14" font-weight="500" fill="#085041" dominant-baseline="central">순수한 방향 비교</text>

<!-- === 하단 === -->
<line x1="60" y1="368" x2="620" y2="368" stroke="#D3D1C7" stroke-width="0.5"/>
<text x="340" y="395" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">왜 정규화가 필요한가?</text>
<text x="340" y="418" text-anchor="middle" font-size="12" fill="#5F5E5A">DotProduct(A, B)는 두 벡터의 크기에 영향을 받음</text>
<text x="340" y="438" text-anchor="middle" font-size="12" fill="#5F5E5A">정규화 후 내적하면 순수한 각도(cos θ)만 얻을 수 있음 → 드리프트 판정에 필수</text>
</svg>